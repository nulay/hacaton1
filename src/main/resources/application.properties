# Database connection (can be overridden by environment variables)
db.url=${DB_URL:jdbc:postgresql://localhost:5432/medical_archive}
db.user=${DB_USER:postgres}
db.password=${DB_PASSWORD:postgres}

# Multipart file upload settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# OCR Provider: "ocrspace" or "gemini"
ocr.provider=${OCR_PROVIDER:ocrspace}

# OCR.space API (free tier, https://ocr.space/ocrapi)
ocr.api.key=${OCR_API_KEY:K89128108588957}

# Gemini API (backup, optional)
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=${GEMINI_API_URL:}

# Stripe API (get keys at https://dashboard.stripe.com/apikeys)
stripe.api.key=${STRIPE_API_KEY:sk_test_your_test_key_here}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:pk_test_your_publishable_key_here}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_secret_here}
stripe.price.id=${STRIPE_PRICE_ID:price_your_price_id_here}
stripe.success.url=${STRIPE_SUCCESS_URL:http://localhost:8080/medical-archive/payment/success}
stripe.cancel.url=${STRIPE_CANCEL_URL:http://localhost:8080/medical-archive/payment/cancel}

# Freemium settings
freemium.document.limit=${FREEMIUM_DOCUMENT_LIMIT:20}

# Logging
logging.level.root=DEBUG
logging.level.com.hackaton=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{60} - %msg%n
spring.logging.file.name=${catalina.base}/logs/medical-archive.log
