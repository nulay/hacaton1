services:
  postgres:
    image: postgres:16-alpine
    container_name: medical-archive-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: medical_archive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/db/init/01-create-database.sql:/docker-entrypoint-initdb.d/01-create-database.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medical_archive"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
